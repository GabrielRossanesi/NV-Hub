<svg
  viewBox="0 0 100 100"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  width="32"
  height="32"
>
  <!-- N shape: Left leg vertical, diagonal down-right, right leg vertical -->
  <path
    d="M25 70 V30 L47 70 V30"
    stroke="#d4b26f"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />
  <!-- V shape: Left leg diagonal down-right, right leg diagonal up-right -->
  <path
    d="M51 30 L64 70 L77 30"
    stroke="#d4b26f"
    strokeWidth="10"
    strokeLinecap="round"
    strokeLinejoin="round"
  />
  <!-- Center Hub Node at the bottom of V (64, 70) -->
  <circle
    cx="64"
    cy="70"
    r="7.5"
    fill="#ffffff"
  />
  <circle
    cx="64"
    cy="70"
    r="3"
    fill="#d4b26f"
  />
</svg>
